<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mister Kelvin | Pronostics Privés</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }
        body {
            background-color: #0d1117;
            color: #f0f6fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #d4af37;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 13px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        .card-box {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .price {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
        }
        .price-desc {
            font-size: 12px;
            color: #8b949e;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: #d4af37;
            color: #0d1117;
            font-weight: 700;
            text-transform: uppercase;
            padding: 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 1px;
            transition: background 0.2s;
            text-decoration: none;
        }
        .btn:hover {
            background-color: #f1c40f;
        }
        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #6e7681;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MISTER KELVIN</div>
        <div class="subtitle">Analyse & Pronostics Officiels</div>
        
        <div class="card-box">
            <div class="price">2 000 FCFA</div>
            <div class="price-desc">Accès exclusif au VIP / Slip du jour</div>
        </div>

        <a href="#" class="btn">Valider mon accès</a>

        <div class="footer">
            Paiement sécurisé via Mobile Money (MTN / Orange)<br>Service strictement réservé aux abonnés.
        </div>
    </div>
</body>
</html>
