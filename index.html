<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING PRONOSTICS MR KELVIN - Espace VIP</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .main-card {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 35px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        .badge {
            background: #fef08a;
            color: #854d0e;
            font-size: 11px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 15px;
        }
        h1 {
            color: #0f172a;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        h1 span {
            color: #ca8a04;
        }
        p {
            color: #64748b;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .price-box {
            background: #f1f5f9;
            border: 2px solid #22c55e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        .price-label {
            font-size: 12px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .price-value {
            font-size: 32px;
            font-weight: 900;
            color: #16a34a;
        }
        .features {
            text-align: left;
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }
        .feature-item {
            font-size: 13px;
            color: #334155;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .feature-item:last-child {
            margin-bottom: 0;
        }
        .feature-item::before {
            content: "✓";
            color: #16a34a;
            font-weight: bold;
            margin-right: 8px;
            font-size: 15px;
        }
        .pay-btn {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.2s;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }
        .pay-btn:hover {
            background-color: #16a34a;
        }
        .secure-text {
            margin-top: 15px;
            font-size: 11px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="main-card" id="payment-container">
        <div class="badge">Accès VIP Officiel</div>
        <h1>KING <span>PRONOSTICS</span></h1>
        <p>Débloquez instantanément les pronostics sécurisés et optimisés du jour.</p>
        
        <div class="price-box">
            <div class="price-label">Montant Unique</div>
            <div class="price-value">2 100 XAF</div>
        </div>

        <div class="features">
            <div class="feature-item">Analyses détaillées et fiables</div>
            <div class="feature-item">Validation par Mobile Money</div>
            <div class="feature-item">Déblocage instantané de l'espace</div>
        </div>

        <button class="pay-btn" id="pay-btn" onclick="initiatePayment()">Payer avec Mobile Money</button>
        
        <div class="secure-text">
            🔒 Transaction sécurisée par MTN & Orange Money
        </div>
    </div>

    <script>
    async function initiatePayment() {
        const btn = document.getElementById('pay-btn');
        btn.innerText = "Chargement en cours...";
        btn.disabled = true;

        try {
            const response = await fetch("https://api.notchpay.co/payments", {
                method: "POST",
                headers: {
                    "Authorization": "pk_test.SnPk9Mi1LSD6liRQV8V4PevPuViTCz8nVvbqeyPC8Lr0Eigwz4e",
                    "Content-Type": "application/json",
                    "Accept": "pjson"
                },
                body: JSON.stringify({
                    email: "client@kingpronostics.com",
                    name: "Client VIP Kelvin",
                    amount: 2100,
                    currency: "XAF",
                    reference: "vip_" + Date.now()
                })
            });

            const data = await response.json();

            if (response.ok && data.authorization_url) {
                // Redirection vers la page de paiement sécurisée Notch Pay
                window.location.href = data.authorization_url;
            } else {
                alert("Erreur : " + (data.message || "Impossible d'initialiser le paiement."));
                btn.innerText = "Payer avec Mobile Money";
                btn.disabled = false;
            }
        } catch (error) {
            console.error("Erreur réseau:", error);
            alert("Erreur de connexion au serveur de paiement.");
            btn.innerText = "Payer avec Mobile Money";
            btn.disabled = false;
        }
    }
    </script>

</body>
</html>
