<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - King Pronostics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 20px; }
        .admin-container { max-width: 480px; margin: auto; background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        h2 { color: #facc15; text-align: center; margin-bottom: 5px; }
        .stats-card { background: #334155; padding: 15px; border-radius: 8px; margin: 15px 0; text-align: center; }
        .counter { font-size: 32px; font-weight: bold; color: #22c55e; }
        .upload-section { margin-top: 20px; border-top: 1px solid #475569; padding-top: 15px; }
        label { display: block; text-align: left; font-size: 14px; margin-bottom: 5px; color: #94a3b8; }
        input[type="file"], select { width: 100%; margin: 8px 0 15px 0; padding: 10px; background: #0f172a; color: white; border: 1px solid #475569; border-radius: 6px; box-sizing: border-box; }
        .btn-upload { background: #3b82f6; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-upload:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h2>Panel Administrateur Partagé</h2>
        <p style="text-align: center; font-size: 13px; color: #94a3b8; margin-bottom: 20px;">Gestion des gains et des pronostics</p>
        
        <!-- Suivi des payants et calcul net de la cagnotte (2000 FCFA par personne) -->
        <div class="stats-card">
            <h3>Nombre de personnes ayant payé :</h3>
            <div class="counter" id="payer-count">14</div>
            <p style="font-size: 14px; color: #cbd5e1; margin-top: 8px;">
                Cagnotte nette : <span id="total-cagnotte" style="color: #facc15; font-weight: bold;">28 000</span> FCFA 
                <span style="font-size: 11px; display:block; color:#94a3b8; margin-top:3px;">(Calculé sur la base exacte de 2 000 FCFA par personne)</span>
            </p>
        </div>

        <!-- Espace d'upload des images (Paris en cours, acceptés, gagnants) -->
        <div class="upload-section">
            <h3>Uploader une image de pronostic</h3>
            <label>Choisir la catégorie :</label>
            <select id="bet-category">
                <option value="en-cours">Paris en cours</option>
                <option value="acceptes">Paris acceptés</option>
                <option value="gagnants">Paris gagnants</option>
            </select>
            
            <label>Sélectionner l'image :</label>
            <input type="file" id="pronostic-image" accept="image/*">
            
            <button class="btn-upload" onclick="uploadPredictionImage()">Publier sur le site</button>
        </div>
    </div>

    <script>
        // Calcul automatique de la cagnotte nette (Nombre de payants × 2000)
        const pricePerUnit = 2000;
        let payerCount = 14; // Modifiable selon les données réelles
        document.getElementById('total-cagnotte').innerText = (payerCount * pricePerUnit).toLocaleString();

        function uploadPredictionImage() {
            const fileInput = document.getElementById('pronostic-image');
            const category = document.getElementById('bet-category').value;
            
            if(fileInput.files.length > 0) {
                alert("Succès ! L'image a bien été postée dans la catégorie : " + category);
                fileInput.value = "";
            } else {
                alert("Veuillez sélectionner une image à uploader.");
            }
        }
    </script>
</body>
</html>
